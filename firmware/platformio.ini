; EV Diagnostic — ESP32-S3 firmware
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Partition: default (compatibile con LittleFS)
board_build.partitions = default.csv

; LittleFS (non SPIFFS): wear-leveling migliore, più robusto in caso di power-off improvviso.
; Se manca, uploadfs usa SPIFFS di default e il firmware si aspetta LittleFS.
board_build.filesystem = littlefs

; Extra flags if needed
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
